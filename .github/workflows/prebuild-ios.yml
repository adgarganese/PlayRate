# Generate the iOS native project on a macOS runner so EAS can skip prebuild
# (avoids EACCES .expo/web on EAS and lets you build from Windows without a Mac).
# Run once manually from GitHub Actions, then push. After that, EAS builds will use the committed ios/.
name: Prebuild iOS

on:
  workflow_dispatch:

permissions:
  contents: write   # so the workflow can push the ios folder

jobs:
  prebuild:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Commit and push ios folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios
          if git diff --staged --quiet; then
            echo "No changes to ios/"
            exit 0
          fi
          git commit -m "chore: add ios from prebuild [skip ci]"
          git push
