# Generate the iOS native project on a macOS runner so EAS can skip prebuild
# (avoids EACCES .expo/web on EAS and lets you build from Windows without a Mac).
# Run once manually from GitHub Actions, then push. After that, EAS builds will use the committed ios/.
#
# If "Commit and push" fails: add a Personal Access Token (repo scope) as repo secret "GH_PAT".
name: Prebuild iOS

on:
  workflow_dispatch:

permissions:
  contents: write   # so the workflow can push the ios folder

jobs:
  prebuild:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Show versions
        run: |
          node -v
          npm -v
          npx expo --version

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Commit and push ios folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git reset --soft origin/"$BRANCH"
          git add ios
          if git diff --staged --quiet; then
            echo "No changes to ios/"
            exit 0
          fi
          git commit -m "chore: add ios from prebuild [skip ci]"
          git push origin HEAD:"$BRANCH"
